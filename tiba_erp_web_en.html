<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>🏨 TIBA ERP v5.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');

:root {
  --bg-dark:       #0A0E1A;
  --bg-card:       #111827;
  --bg-sidebar:    #0D1117;
  --gold:          #F5A623;
  --teal:          #00D4AA;
  --blue:          #3B82F6;
  --pink:          #EC4899;
  --purple:        #8B5CF6;
  --red:           #EF4444;
  --green:         #10B981;
  --text-primary:  #F9FAFB;
  --text-sec:      #9CA3AF;
  --text-muted:    #6B7280;
  --border:        #1F2937;
  --hover:         #1E293B;
  --input-bg:      #1F2937;
  --sidebar-w:     240px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg-dark); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ═══════════════════════ LOGIN ═══════════════════════ */
#login-screen {
  position:fixed; inset:0;
  background: linear-gradient(135deg, #0A0E1A 0%, #0D1117 50%, #111827 100%);
  display:flex; align-items:center; justify-content:center;
  z-index:1000;
}
.login-card {
  background: var(--bg-card);
  border:2px solid var(--gold);
  border-radius:20px;
  padding:40px 36px;
  width:min(400px, 92vw);
  text-align:center;
  box-shadow: 0 0 60px rgba(245,166,35,0.15);
  animation: loginFadeIn .5s ease;
}
@keyframes loginFadeIn { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
.login-icon { font-size:52px; margin-bottom:8px; }
.login-title { font-size:22px; font-weight:900; color:var(--gold); letter-spacing:1px; }
.login-sub { font-size:12px; color:var(--text-sec); margin-bottom:24px; }
.login-divider { height:2px; background:var(--gold); border-radius:1px; margin:16px 0 20px; }
.login-label { display:block; text-align:left; font-size:11px; color:var(--text-sec); margin-bottom:4px; }
.login-input {
  width:100%; padding:13px 14px; background:var(--input-bg);
  border:1px solid var(--border); border-radius:10px;
  color:var(--text-primary); font-family:'Inter',sans-serif; font-size:14px;
  outline:none; margin-bottom:14px; transition:.2s;
}
.login-input:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(0,212,170,.12); }
.login-btn {
  width:100%; padding:14px; background:var(--gold); color:#0A0E1A;
  border:none; border-radius:10px; font-size:16px; font-weight:800;
  cursor:pointer; transition:.2s; font-family:'Inter',sans-serif;
}
.login-btn:hover { background:var(--teal); }
.login-err { color:var(--red); font-size:12px; margin-top:8px; min-height:18px; }

/* ═══════════════════════ LAYOUT ═══════════════════════ */
#app { display:none; height:100vh; overflow:hidden; }

/* Topbar */
#topbar {
  position:fixed; top:0; left:0; right:0; height:52px;
  background:var(--bg-card); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 16px; z-index:200;
  gap:12px;
}
#menu-btn {
  background:none; border:none; color:var(--gold); font-size:22px;
  cursor:pointer; padding:4px; display:none;
}
#topbar-title { font-size:15px; font-weight:700; flex:1; }
#topbar-clock { font-size:11px; color:var(--gold); white-space:nowrap; }
#topbar-user { font-size:11px; color:var(--teal); white-space:nowrap; }

/* Sidebar */
#sidebar {
  position:fixed; top:52px; bottom:0; left:0;
  width:var(--sidebar-w); background:var(--bg-sidebar);
  border-right:1px solid var(--border); overflow-y:auto;
  z-index:150; display:flex; flex-direction:column;
  transition: transform .3s ease;
}
.sidebar-logo { padding:16px; text-align:center; border-bottom:1px solid var(--border); }
.sidebar-logo .s-icon { font-size:28px; }
.sidebar-logo .s-name { color:var(--gold); font-weight:900; font-size:13px; }
.sidebar-logo .s-ver  { color:var(--text-muted); font-size:9px; }

.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; cursor:pointer; color:var(--text-sec);
  font-size:13px; transition:.15s; border-radius:0;
  border:none; background:none; width:100%; text-align:left;
  font-family:'Inter',sans-serif;
}
.nav-item:hover  { background:var(--hover); color:var(--text-primary); }
.nav-item.active { background:var(--hover); color:var(--gold); }
.nav-icon { font-size:16px; min-width:20px; text-align:center; }

.sidebar-footer { margin-top:auto; padding:12px 14px; border-top:1px solid var(--border); }
.sidebar-user-name { color:var(--teal); font-size:11px; font-weight:600; }
.sidebar-user-role { color:var(--text-muted); font-size:10px; margin-bottom:8px; }
.logout-btn {
  background:var(--red); color:white; border:none; border-radius:7px;
  padding:7px 14px; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif;
  width:100%;
}

/* Overlay for mobile sidebar */
#overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);
  z-index:140; backdrop-filter:blur(2px);
}

/* Main content */
#main {
  margin-top:52px;
  margin-left:var(--sidebar-w);
  height:calc(100vh - 52px);
  overflow-y:auto;
  padding:16px;
}

/* ═══════════════════════ CARDS & STATS ═══════════════════════ */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:10px; margin-bottom:14px; }
.stat-card {
  background:var(--bg-card); border-radius:12px; padding:14px;
  border:1px solid var(--border); position:relative; overflow:hidden;
}
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--c,var(--teal)); }
.stat-icon { font-size:20px; margin-bottom:4px; }
.stat-val  { font-size:22px; font-weight:900; color:var(--c,var(--teal)); }
.stat-lbl  { font-size:11px; color:var(--text-sec); margin-top:2px; }

.card { background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:14px; }
.card-title { font-size:14px; font-weight:700; color:var(--gold); margin-bottom:12px; }

/* ═══════════════════════ REPORT TABS ═══════════════════════ */
.rpt-tabs { display:flex; gap:4px; flex-wrap:wrap; background:var(--bg-card); border:1px solid var(--border);
  border-radius:12px; padding:6px; margin-bottom:12px; }
.rpt-tab { flex:1; min-width:120px; padding:10px 14px; border:none; border-radius:8px; cursor:pointer;
  background:transparent; color:var(--text-sec); font-family:'Inter',sans-serif; font-size:12px; font-weight:700;
  display:inline-flex; align-items:center; justify-content:center; gap:6px; transition:.15s; white-space:nowrap; }
.rpt-tab:hover { background:var(--hover); color:var(--text-primary); }
.rpt-tab.active { background:var(--bg-dark); color:var(--gold); box-shadow:inset 0 -2px 0 var(--gold); }

/* ═══════════════════════ TABLE ═══════════════════════ */
.tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:10px; }
table { width:100%; border-collapse:collapse; font-size:12px; min-width:500px; }
thead th {
  background:var(--bg-dark); color:var(--gold); padding:10px 12px;
  text-align:center; font-weight:700; font-size:11px; white-space:nowrap;
  position:sticky; top:0; z-index:2;
}
tbody tr { border-bottom:1px solid var(--border); transition:.15s; }
tbody tr:hover { background:var(--hover); }
tbody tr.selected { background:rgba(59,130,246,.2); }
tbody td { padding:10px 12px; text-align:center; white-space:nowrap; }

.badge {
  display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700;
}
.badge-green  { background:rgba(16,185,129,.15); color:var(--green); }
.badge-blue   { background:rgba(59,130,246,.15);  color:var(--blue); }
.badge-gold   { background:rgba(245,166,35,.15);  color:var(--gold); }
.badge-red    { background:rgba(239,68,68,.15);   color:var(--red); }
.badge-purple { background:rgba(139,92,246,.15);  color:var(--purple); }
.badge-gray   { background:rgba(107,114,128,.15); color:var(--text-muted); }

/* ═══════════════════════ BUTTONS ═══════════════════════ */
.btn-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.btn {
  padding:8px 14px; border:none; border-radius:8px; cursor:pointer;
  font-size:12px; font-weight:700; font-family:'Inter',sans-serif;
  display:inline-flex; align-items:center; gap:5px; transition:.15s;
  white-space:nowrap;
}
.btn:hover { opacity:.85; transform:translateY(-1px); }
.btn:active { transform:translateY(0); }
.btn-teal   { background:var(--teal);   color:#0A0E1A; }
.btn-blue   { background:var(--blue);   color:#fff; }
.btn-gold   { background:var(--gold);   color:#0A0E1A; }
.btn-red    { background:var(--red);    color:#fff; }
.btn-purple { background:var(--purple); color:#fff; }
.btn-green  { background:var(--green);  color:#fff; }
.btn-gray   { background:var(--text-muted); color:#fff; }

/* ═══════════════════════ FORMS ═══════════════════════ */
.form-section { max-width:680px; margin:0 auto; }
.form-hdr {
  padding:14px 18px; border-radius:12px 12px 0 0;
  font-size:15px; font-weight:800; margin-bottom:0;
}
.form-body { background:var(--bg-card); border-radius:0 0 12px 12px; padding:20px; border:1px solid var(--border); }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-grid.single { grid-template-columns:1fr; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-label { font-size:11px; color:var(--text-sec); font-weight:600; }
.form-input, .form-select, .form-textarea {
  background:var(--input-bg); border:1px solid var(--border);
  border-radius:8px; color:var(--text-primary); padding:10px 12px;
  font-family:'Inter',sans-serif; font-size:13px; outline:none; transition:.2s; width:100%;
}
.form-input:focus, .form-select:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(0,212,170,.1); }
.form-select option { background:var(--bg-card); }
.form-textarea { resize:vertical; min-height:72px; }
.form-actions { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }

/* ═══════════════════════ ALERTS ═══════════════════════ */
.alert {
  padding:10px 14px; border-radius:8px; font-size:12px; font-weight:600;
  display:flex; align-items:center; gap:8px; margin-bottom:10px; animation:alertIn .25s ease;
}
@keyframes alertIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.alert-success { background:rgba(16,185,129,.15); color:var(--green); border:1px solid rgba(16,185,129,.3); }
.alert-error   { background:rgba(239,68,68,.15);  color:var(--red);   border:1px solid rgba(239,68,68,.3); }
.alert-close   { margin-right:auto; cursor:pointer; font-size:14px; background:none; border:none; color:inherit; }

/* ═══════════════════════ TOAST ═══════════════════════ */
.modal-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
#toast-area {
  position:fixed; top:64px; left:50%; transform:translateX(-50%);
  z-index:600; display:flex; flex-direction:column; gap:8px; align-items:center;
  pointer-events:none; width:max-content; max-width:92vw;
}
.toast {
  display:flex; align-items:center; gap:8px; padding:11px 18px; border-radius:10px;
  font-size:13px; font-weight:600; box-shadow:0 8px 24px rgba(0,0,0,.45);
  animation:toastIn .25s ease; pointer-events:auto;
}
.toast-out { animation:toastOut .25s ease forwards; }
.toast-error   { background:#2a1416; color:#fca5a5; border:1px solid rgba(239,68,68,.45); }
.toast-success { background:#0f2018; color:#86efac; border:1px solid rgba(16,185,129,.45); }
@keyframes toastIn  { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
@keyframes toastOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-10px)} }

/* ═══════════════════════ POS ═══════════════════════ */
.pos-layout { display:grid; grid-template-columns:1fr 300px; gap:14px; height:calc(100vh - 100px); }
.pos-products { overflow-y:auto; }
.pos-cart { display:flex; flex-direction:column; background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:14px; overflow:hidden; }
.product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:8px; }
.product-btn {
  background:var(--blue); color:#fff; border:none; border-radius:10px;
  padding:12px 8px; cursor:pointer; font-family:'Inter',sans-serif; font-size:11px;
  font-weight:700; text-align:center; transition:.15s;
}
.product-btn:hover { opacity:.85; transform:translateY(-2px); }
.product-btn .p-name { display:block; font-size:11px; margin-bottom:4px; }
.product-btn .p-price { font-size:13px; color:var(--gold); }
.product-btn .p-stock { font-size:9px; opacity:.7; }
.cart-items { flex:1; overflow-y:auto; }
.cart-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 0; border-bottom:1px solid var(--border); font-size:12px;
}
.cart-item-name { flex:1; color:var(--text-primary); }
.cart-item-qty { color:var(--teal); font-weight:700; margin:0 8px; }
.cart-item-total { color:var(--gold); font-weight:700; }
.cart-total-bar {
  background:var(--hover); border-radius:8px; padding:10px;
  text-align:center; font-size:18px; font-weight:900; color:var(--gold); margin:10px 0;
}
.cart-discount-info { font-size:10px; color:var(--text-muted); }

/* ── POS PRO upgrades ── */
.pos-search { display:flex; gap:8px; margin-bottom:8px; }
.pos-search input { flex:1; background:var(--input-bg); border:1px solid var(--border); border-radius:8px; color:var(--text-primary); padding:9px 12px; font-family:'Inter',sans-serif; font-size:13px; outline:none; }
.pos-search input:focus { border-color:var(--teal); }
.product-btn { position:relative; }
.product-btn .p-low { position:absolute; top:5px; right:6px; background:var(--red); color:#fff; font-size:8px; font-weight:800; padding:1px 5px; border-radius:8px; }
.product-btn.oos { opacity:.45; filter:grayscale(.6); }
.pos-empty { text-align:center; padding:48px 18px; color:var(--text-muted); }
.pos-empty .e-ic { font-size:46px; margin-bottom:10px; }

.order-type { display:flex; gap:6px; margin-bottom:8px; }
.order-type button { flex:1; padding:7px 4px; border-radius:8px; border:1px solid var(--border); background:var(--hover); color:var(--text-sec); font-size:11px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:.15s; }
.order-type button.active { background:var(--teal); color:#0A0E1A; border-color:var(--teal); }

.cart-item { gap:6px; }
.cart-qty-ctrl { display:flex; align-items:center; gap:4px; }
.cart-qty-ctrl button { width:20px; height:20px; border-radius:5px; border:none; background:var(--hover); color:var(--text-primary); font-size:13px; font-weight:800; cursor:pointer; line-height:1; }
.cart-qty-ctrl button:hover { background:var(--teal); color:#0A0E1A; }
.cart-qty-ctrl .q { min-width:20px; text-align:center; color:var(--teal); font-weight:800; font-size:12px; }
.cart-del { background:none; border:none; color:var(--red); cursor:pointer; font-size:14px; padding:0 2px; }
.cart-empty-note { text-align:center; color:var(--text-muted); font-size:11px; padding:24px 6px; }

.pos-totals { font-size:12px; margin:6px 0; }
.pos-totals .row { display:flex; justify-content:space-between; padding:2px 0; color:var(--text-sec); }
.pos-totals .row.grand { border-top:1px dashed var(--border); margin-top:4px; padding-top:6px; font-size:17px; font-weight:900; color:var(--gold); }
.pos-totals .row .neg { color:var(--green); }

.pos-mini-row { display:flex; gap:6px; }
.pos-mini-row input, .pos-mini-row select { flex:1; min-width:0; }
.disc-seg { display:flex; }
.disc-seg button { border:1px solid var(--border); background:var(--hover); color:var(--text-sec); font-size:11px; font-weight:700; cursor:pointer; padding:0 9px; }
.disc-seg button:first-child { border-radius:8px 0 0 8px; }
.disc-seg button:last-child { border-radius:0 8px 8px 0; }
.disc-seg button.active { background:var(--gold); color:#0A0E1A; border-color:var(--gold); }

.parked-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
.parked-chip { background:var(--purple); color:#fff; border:none; border-radius:20px; padding:5px 11px; font-size:11px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; }
.parked-chip:hover { opacity:.85; }

/* receipt */
.receipt { max-width:340px; margin:0 auto; background:#fff; color:#111; font-family:'Courier New',monospace; font-size:12px; padding:18px 16px; border-radius:6px; line-height:1.5; }
.receipt h3 { text-align:center; margin:0 0 2px; font-size:16px; }
.receipt .r-sub { text-align:center; font-size:10px; color:#555; margin-bottom:8px; }
.receipt .r-line { border-top:1px dashed #999; margin:7px 0; }
.receipt table { width:100%; border-collapse:collapse; }
.receipt td { padding:1px 0; vertical-align:top; }
.receipt .r-tot td { font-weight:800; }
.receipt .r-foot { text-align:center; font-size:11px; margin-top:10px; }
@media print {
  body * { visibility:hidden; }
  #print-zone, #print-zone * { visibility:visible; }
  #print-zone { position:absolute; left:0; top:0; width:100%; }
  .no-print { display:none !important; }
}

/* ═══════════════════════ DASHBOARD ROOMS ═══════════════════════ */
.room-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; }
.room-tile {
  background:var(--hover); border-radius:10px; padding:10px;
  border:1px solid var(--border); text-align:center; font-size:12px;
}
.room-num { font-size:16px; font-weight:800; }
.room-type { font-size:9px; color:var(--text-muted); margin:2px 0; }
.room-status { font-size:10px; font-weight:700; }
.room-hk { font-size:9px; color:var(--text-muted); }

/* ═══════════════════════ SEARCH ═══════════════════════ */
.search-bar {
  display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap;
}
.search-input {
  background:var(--input-bg); border:1px solid var(--border); border-radius:8px;
  color:var(--text-primary); padding:8px 12px; font-family:'Inter',sans-serif; font-size:13px;
  outline:none; flex:1; min-width:160px;
}
.search-input:focus { border-color:var(--teal); }
.filter-pills { display:flex; gap:6px; flex-wrap:wrap; }
.pill {
  padding:4px 10px; border-radius:20px; border:1px solid var(--border);
  font-size:11px; cursor:pointer; color:var(--text-sec); background:none;
  font-family:'Inter',sans-serif; transition:.15s;
}
.pill.active { background:var(--gold); color:#0A0E1A; border-color:var(--gold); font-weight:700; }

/* ═══════════════════════ PAGE HEADER ═══════════════════════ */
.page-hdr { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.page-back { background:none; border:none; color:var(--teal); cursor:pointer; font-size:20px; padding:2px; }
.page-ttl  { font-size:17px; font-weight:800; }

/* ═══════════════════════ CONFIRM BOX ═══════════════════════ */
.confirm-box {
  max-width:420px; margin:40px auto; background:var(--bg-card);
  border-radius:16px; padding:32px 24px; border:2px solid var(--red); text-align:center;
}

/* ═══════════════════════ FOLIO ═══════════════════════ */
.folio-receipt {
  font-family:monospace; font-size:12px; background:var(--bg-dark);
  padding:16px; border-radius:10px; white-space:pre; overflow-x:auto;
  border:1px solid var(--border); line-height:1.7;
}

/* ═══════════════════════ FRONT DESK ═══════════════════════ */
.fd-cols { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; align-items:start; }
.fd-col { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.fd-col-hdr { padding:11px 14px; font-weight:800; font-size:13px; display:flex; justify-content:space-between; align-items:center; color:#0A0E1A; }
.fd-arr { background:var(--green); } .fd-dep { background:var(--gold); } .fd-stay { background:var(--blue); color:#fff; }
.fd-col-hdr .cnt { background:rgba(0,0,0,.18); border-radius:20px; padding:1px 9px; font-size:12px; }
.fd-list { max-height:calc(100vh - 290px); overflow-y:auto; }
.fd-item { padding:10px 14px; border-bottom:1px solid var(--border); }
.fd-item:last-child { border-bottom:none; }
.fd-name { font-weight:700; font-size:13px; color:var(--text-primary); }
.fd-meta { font-size:11px; color:var(--text-sec); margin:2px 0 6px; }
.fd-actions { display:flex; gap:6px; flex-wrap:wrap; }
.fd-actions .btn { padding:5px 10px; font-size:11px; }
.fd-empty { padding:24px 14px; text-align:center; color:var(--text-muted); font-size:12px; }
.fd-bal { font-weight:800; }
@media (max-width:768px){ .fd-cols { grid-template-columns:1fr; } }

/* group booking room picker */
.grp-rooms { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; margin-top:8px; }
.grp-room { border:1px solid var(--border); border-radius:9px; padding:9px; cursor:pointer; background:var(--hover); transition:.12s; }
.grp-room.sel { border-color:var(--teal); background:rgba(0,212,170,.12); }
.grp-room .gr-num { font-weight:800; font-size:13px; }
.grp-room .gr-type { font-size:10px; color:var(--text-muted); }

/* RESPONSIVE */
/* ═══════════════════════ RESPONSIVE ═══════════════════════ */
@media (max-width:768px) {
  :root { --sidebar-w: 0px; }
  #menu-btn { display:block !important; }
  #sidebar { transform:translateX(-100%); width:240px; }
  #sidebar.open { transform:translateX(0); }
  #overlay.show { display:block; }
  #main { margin-left:0; padding:12px; }
  .form-grid { grid-template-columns:1fr; }
  .pos-layout { grid-template-columns:1fr; height:auto; }
  .pos-cart { max-height:350px; }
  .product-grid { grid-template-columns:repeat(auto-fill,minmax(85px,1fr)); }
  .stat-grid { grid-template-columns:repeat(2,1fr); }
  table { font-size:11px; }
  thead th, tbody td { padding:8px 8px; }
}
@media (max-width:380px) {
  .btn { padding:7px 10px; font-size:11px; }
  .login-card { padding:28px 20px; }
}

/* PRINT FOLIO */
@media print {
  #sidebar, #topbar, .btn-row, .page-back, #toast-area { display:none !important; }
  #main { margin:0; padding:0; }
  .folio-receipt { border:none; }
}

function loadData() {
  try { const s=localStorage.getItem(STORE_KEY); if(s) return JSON.parse(s); } catch(e){}
  return defaultData();
}
function saveData() { localStorage.setItem(STORE_KEY, JSON.stringify(D)); }
let D = loadData();
// ── migrations: ensure OTA channels exist and are up to date on older saved data ──
const OTA_SEED_VERSION = 2;
(function migrateOTA(){
  const def = defaultData();
  if(!D.ota_channels){
    D.ota_channels = def.ota_channels;
    D.next_ota_id = def.next_ota_id;
    D.ota_seed_version = OTA_SEED_VERSION;
    saveData(); return;
  }
  if((D.ota_seed_version||1) < OTA_SEED_VERSION){
    // merge any missing default channels (by name) without touching the user's existing/edited ones
    const have = new Set(D.ota_channels.map(o=>(o.name||'').toLowerCase()));
    let nextId = D.next_ota_id || (D.ota_channels.length+1);
    def.ota_channels.forEach(o=>{
      if(!have.has(o.name.toLowerCase())){
        D.ota_channels.push({...o, id:`OTA${String(nextId).padStart(3,'0')}`});
        nextId++;
      }
    });
    // backfill category/region on older minimal records
    D.ota_channels.forEach(o=>{ if(!o.category) o.category='OTA'; if(!o.region) o.region='Global'; });
    D.next_ota_id = nextId;
    D.ota_seed_version = OTA_SEED_VERSION;
    saveData();
  }
})();
// ── migration: ensure POS settings + parked orders exist on older saved data ──
(function migratePOS(){
  const def = defaultData();
  let changed=false;
  if(!D.pos_settings){ D.pos_settings = def.pos_settings; changed=true; }
  else { for(const k in def.pos_settings){ if(D.pos_settings[k]===undefined){ D.pos_settings[k]=def.pos_settings[k]; changed=true; } } }
  if(!Array.isArray(D.parked_orders)){ D.parked_orders = []; changed=true; }
  if(!Array.isArray(D.rate_plans)){ D.rate_plans = []; changed=true; }
  if(D.next_group_id===undefined){ D.next_group_id = 1; changed=true; }
  if(changed) saveData();
})();
// ── one-time cleanup: remove demo/sample records so the system starts empty and ready for real use ──
if(!D.demo_cleared){
  D.rooms=[]; D.guests=[]; D.reservations=[]; D.products=[];
  D.sales=[]; D.folio_charges=[]; D.expenses=[]; D.hk_tasks=[]; D.maintenance=[]; D.discount_codes=[];
  D.next_guest_id=1; D.next_res_id=1; D.next_sale_id=1; D.next_folio_id=1; D.next_exp_id=1; D.next_hk_id=1; D.next_mnt_id=1;
  D.demo_cleared=true;                 // OTA channels and login accounts are intentionally kept
  saveData();
}

async function doLogin() {
  const u = document.getElementById('li-user').value.trim();
  const p = document.getElementById('li-pass').value.trim();
  const hash = await sha256(p);
  const user = D.users.find(x => x.username===u && x.password===hash && x.active!==false);
  if (!user) {
    document.getElementById('li-err').textContent = '❌ Invalid username or password';
    document.getElementById('li-pass').value = '';
    return;
  }
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbar-user').textContent = '👤 ' + user.name;
  document.getElementById('sb-uname').textContent = user.name;
  document.getElementById('sb-urole').textContent = user.role;
  buildNav();
  showDashboard();
  startClock();
}

document.addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });

function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('li-pass').value = '';
  document.getElementById('li-err').textContent = '';
}

// ══════════════════════════════════
let _confirmAction=null, _confirmReturn=null;
function showConfirm(title, sub, icon, confirmFn) {
  // snapshot the current page so Cancel returns exactly where we were
  const prevMain = document.getElementById('main').innerHTML;
  const prevTitle = document.getElementById('topbar-title').textContent;
  _confirmReturn = () => { document.getElementById('main').innerHTML = prevMain; setPageTitle(prevTitle); };
  _confirmAction = confirmFn;
  setPageTitle('⚠️ Confirmation');
  renderMain(`
    <div class="page-hdr"><button class="page-back" onclick="cancelConfirm()">←</button><div class="page-ttl">Confirmation Required</div></div>
    <div class="confirm-box" style="border-color:var(--gold)">
      <div style="font-size:48px;margin-bottom:14px">${icon||'⚠️'}</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:8px">${title}</div>
      <div style="font-size:13px;color:var(--text-sec);margin-bottom:24px;line-height:1.6">${sub||''}</div>
      <div class="modal-actions">
        <button class="btn btn-red"  onclick="runConfirm()">✅ Confirm</button>
        <button class="btn btn-gray" onclick="cancelConfirm()">← Cancel</button>
      </div>
    </div>
  `);
}
function runConfirm() { const fn=_confirmAction; _confirmAction=null; _confirmReturn=null; if(fn) fn(); }
function cancelConfirm() { const fn=_confirmReturn; _confirmAction=null; _confirmReturn=null; if(fn) fn(); }
function closeModal() { cancelConfirm(); }   // legacy alias

// ══════════════════════════════════
//  TOAST  (inline notice instead of browser alert popup)
// ══════════════════════════════════
function toast(msg, type='error') {
  const area = document.getElementById('toast-area');
  if(!area){ return; }
  const t = document.createElement('div');
  t.className = `toast toast-${type==='success'?'success':'error'}`;
  t.innerHTML = `<span>${type==='success'?'✅':'⚠️'}</span><span>${msg}</span>`;
  area.appendChild(t);
  setTimeout(()=>{ t.classList.add('toast-out'); setTimeout(()=>t.remove(),250); }, 2800);
}

// ══════════════════════════════════
//  ALERT
// ══════════════════════════════════
function showAlert(msg, type='success', containerId='alert-area') {
  const el = document.getElementById(containerId);
  if(!el) return;
  const cls = type==='success' ? 'alert-success' : 'alert-error';
  const a = document.createElement('div');
  a.className = `alert ${cls}`;
  a.innerHTML = `${msg} <button class="alert-close" onclick="this.parentElement.remove()">✕</button>`;
  el.appendChild(a);
  setTimeout(() => a.remove && a.remove(), 5000);
}

function statusBadge(s) {
  const map = {
    'Available':'badge-green','Confirmed':'badge-blue','Checked In':'badge-gold',
    'Checked Out':'badge-gray','Cancelled':'badge-red','Occupied':'badge-gold',
    'Maintenance':'badge-red','Out of Order':'badge-red',
    'Clean':'badge-green','Dirty':'badge-red','Inspect':'badge-purple',
    'Pending':'badge-red','In Progress':'badge-purple','Completed':'badge-green',
    'Open':'badge-red','Resolved':'badge-green',
    'VIP':'badge-gold',
  };
  return `<span class="badge ${map[s]||'badge-gray'}">${s}</span>`;
}

function $$(s) { return document.querySelector(s); }
function $v(s) { return $$(s)?.value||''; }
function nightsBetween(ci,co) {
  const a=new Date(ci), b=new Date(co);
  return Math.round((b-a)/86400000);
}

function addDaysStr(iso,n){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function rmById(id){return D.rooms.find(r=>r.id===id);}
function resCharges(r){return D.folio_charges.filter(f=>f.res_id===r.id).reduce((a,f)=>a+f.amount,0);}
function resBalance(r){return (r.total||0)+resCharges(r)-(r.discount||0)-(r.paid||0);}
function nightlyRate(room,dateISO){
  let rate=room?room.price||0:0;
  (D.rate_plans||[]).filter(p=>p.active).forEach(p=>{
    const scopeOK=(p.scope==='All'||p.scope===room.type);
    const inRange=(!p.from||dateISO>=p.from)&&(!p.to||dateISO<=p.to);
    if(scopeOK&&inRange){ rate = p.type==='percent' ? rate*(1+p.value/100) : rate+p.value; }
  });
  return Math.max(0,rate);
}
function stayRate(room,ci,co){
  const n=nightsBetween(ci,co); let sum=0,d=ci;
  for(let i=0;i<n;i++){ sum+=nightlyRate(room,d); d=addDaysStr(d,1); }
  return sum;
}
function checkInResById(id,after){
  const r=D.reservations.find(x=>x.id===id); if(!r)return;
  r.status='Checked In'; const rm=rmById(r.room); if(rm)rm.status='Occupied';
  saveData(); toast(`✅ ${r.guest} checked in`,'success'); if(after)after();
}
function checkOutResById(id,after){
  const r=D.reservations.find(x=>x.id===id); if(!r)return;
  r.status='Checked Out'; const rm=rmById(r.room); if(rm){rm.status='Available';rm.hk_status='Dirty';}
  const hkId=`HK${String(D.next_hk_id).padStart(3,'0')}`; D.next_hk_id++;
  D.hk_tasks.push({id:hkId,room:r.room,task:'Post-checkout full cleaning',assigned:'',status:'Pending',priority:'High',date:today(),notes:''});
  saveData(); toast(`✅ ${r.guest} checked out`,'success'); if(after)after();
}

function showFrontDesk(){
  setPageTitle('🛎️ Front Desk');
  const t=today();
  const isActive=r=>r.status!=='Cancelled'&&r.status!=='No-Show';
  const arrivals  =D.reservations.filter(r=>isActive(r)&&r.checkin===t);
  const departures=D.reservations.filter(r=>isActive(r)&&r.checkout===t);
  const inhouse   =D.reservations.filter(r=>r.status==='Checked In'&&r.checkin<=t&&t<r.checkout&&r.checkout!==t);
  const rooms=D.rooms;
  const occ=rooms.filter(r=>['Occupied','Checked In'].includes(r.status)).length;
  const availRooms=rooms.filter(r=>r.status==='Available').length;
  const occPct=rooms.length?Math.round(occ/rooms.length*100)+'%':'0%';

  const item=(r,kind)=>{
    const rm=rmById(r.room)||{};
    const bal=resBalance(r);
    const nights=nightsBetween(r.checkin,r.checkout);
    let actions='';
    if(kind==='arr'){
      if(r.status==='Confirmed') actions=`<button class="btn btn-green" onclick="fdCheckIn('${r.id}')">🛎️ Check In</button>`;
      else if(r.status==='Checked In') actions=`<span class="badge badge-green">Arrived</span>`;
      else if(r.status==='Checked Out') actions=`<span class="badge badge-gray">Departed</span>`;
    } else if(kind==='dep'){
      if(r.status==='Checked In') actions=`<button class="btn btn-gold" onclick="fdCheckOut('${r.id}')">🚪 Check Out</button>`;
      else if(r.status==='Checked Out') actions=`<span class="badge badge-gray">Departed</span>`;
      else if(r.status==='Confirmed') actions=`<button class="btn btn-green" onclick="fdCheckIn('${r.id}')">🛎️ Check In</button>`;
    }
    return `<div class="fd-item">
      <div class="fd-name">${r.guest} <span style="color:var(--text-muted);font-weight:600;font-size:11px">${r.id}</span></div>
      <div class="fd-meta">🚪 ${r.room} ${rm.type?'· '+rm.type:''} · ${r.checkin} → ${r.checkout} (${nights}n) · ${statusBadge(r.status)}</div>
      <div class="fd-meta">Balance: <span class="fd-bal" style="color:${bal>0?'var(--red)':'var(--green)'}">${money(bal)}</span></div>
      <div class="fd-actions">
        ${actions}
        <button class="btn btn-blue" onclick="printConfirmation('${r.id}')">📄 Confirmation</button>
        <button class="btn btn-gold" onclick="selectedRes='${r.id}';printFolio()">🧾 Folio</button>
        <button class="btn btn-gray" onclick="showResForm(D.reservations.find(x=>x.id==='${r.id}'))">✏️ Edit</button>
      </div>
    </div>`;
  };

  renderMain(`
    <div class="stat-grid" style="margin-bottom:14px">
      ${sc('🛬','Arrivals Today',arrivals.length,'--green')}
      ${sc('🛫','Departures Today',departures.length,'--gold')}
      ${sc('🏨','In-House',inhouse.length+departures.filter(r=>r.status==='Checked In').length,'--blue')}
      ${sc('🟢','Available Rooms',availRooms,'--teal')}
      ${sc('📈','Occupancy',occPct,'--purple')}
    </div>
    <div class="btn-row">
      <button class="btn btn-teal" onclick="showResForm(null)">➕ New Reservation</button>
      <button class="btn btn-purple" onclick="showGroupBooking()">👥 Group Booking</button>
      <button class="btn btn-blue" onclick="showReservations()">📋 All Reservations</button>
    </div>
    <div class="fd-cols">
      <div class="fd-col">
        <div class="fd-col-hdr fd-arr">🛬 Arrivals <span class="cnt">${arrivals.length}</span></div>
        <div class="fd-list">${arrivals.length?arrivals.map(r=>item(r,'arr')).join(''):'<div class="fd-empty">No arrivals today</div>'}</div>
      </div>
      <div class="fd-col">
        <div class="fd-col-hdr fd-dep">🛫 Departures <span class="cnt">${departures.length}</span></div>
        <div class="fd-list">${departures.length?departures.map(r=>item(r,'dep')).join(''):'<div class="fd-empty">No departures today</div>'}</div>
      </div>
      <div class="fd-col">
        <div class="fd-col-hdr fd-stay">🏨 In-House <span class="cnt">${inhouse.length}</span></div>
        <div class="fd-list">${inhouse.length?inhouse.map(r=>item(r,'stay')).join(''):'<div class="fd-empty">No in-house guests</div>'}</div>
      </div>
    </div>
  `);
}
function fdCheckIn(id){ checkInResById(id, showFrontDesk); }
function fdCheckOut(id){
  const r=D.reservations.find(x=>x.id===id); const bal=r?resBalance(r):0;
  if(bal>0){ showConfirm(`Check out ${r.guest}?`,`Outstanding balance of ${money(bal)} is still due. Proceed anyway?`,'🚪',()=>checkOutResById(id,showFrontDesk)); }
  else checkOutResById(id, showFrontDesk);
}

        </div>

function grpToggleRoom(id,el){ if(grpSelRooms.has(id)){grpSelRooms.delete(id);el.classList.remove('sel');}else{grpSelRooms.add(id);el.classList.add('sel');} grpUpdateSummary(); }
function grpUpdateSummary(){
  const ci=$v('#g-ci'),co=$v('#g-co'); const n=ci&&co?nightsBetween(ci,co):0;
  let total=0; grpSelRooms.forEach(id=>{const rm=rmById(id);if(rm&&n>0)total+=stayRate(rm,ci,co);});
  const el=document.getElementById('grp-summary');
  if(el)el.innerHTML=`Selected <strong style="color:var(--teal)">${grpSelRooms.size}</strong> room(s) · <strong>${n}</strong> night(s) · Estimated total: <strong style="color:var(--gold)">${money(total)}</strong>`;
}
function saveGroupBooking(){
  const name=$v('#g-name').trim(); const ci=$v('#g-ci'),co=$v('#g-co');
  const source=$v('#g-source'); const adults=parseInt($v('#g-adults'))||1; const children=parseInt($v('#g-children'))||0;
  if(!name) return showAlert('⚠️ Enter a group / lead guest name','error');
  if(nightsBetween(ci,co)<=0) return showAlert('⚠️ Check-out must be after check-in','error');
  if(!grpSelRooms.size) return showAlert('⚠️ Select at least one room','error');
  const gid=`GRP${String(D.next_group_id).padStart(3,'0')}`; D.next_group_id++;
  let count=0;
  grpSelRooms.forEach(roomId=>{
    const room=rmById(roomId); if(!room)return;
    const total=Math.max(0,stayRate(room,ci,co));
    const id=`RES${String(D.next_res_id).padStart(3,'0')}`; D.next_res_id++;
    D.reservations.push({id,guest:name,guest_id:'',room:roomId,checkin:ci,checkout:co,adults,children,total,paid:0,status:'Confirmed',notes:`Group ${gid}`,source,discount:0,group_id:gid});
    room.status='Occupied'; count++;
  });
  saveData(); showAlert(`✅ Group ${gid} created with ${count} room(s)!`);
  setTimeout(showFrontDesk,1200);
}

function saveRatePlan(){
  const name=$v('#rp-name').trim(); const scope=$v('#rp-scope'); const type=$v('#rp-type');
  const value=parseFloat($v('#rp-value')); const from=$v('#rp-from'); const to=$v('#rp-to');
  if(!name) return showAlert('⚠️ Enter a plan name','error');
  if(isNaN(value)) return showAlert('⚠️ Enter an adjustment value','error');
  if(from&&to&&to<from) return showAlert('⚠️ "To" date must be after "From"','error');
  const id=`RP${String(D.rate_plans.length+1).padStart(3,'0')}`;
  D.rate_plans.push({id,name,scope,type,value,from,to,active:true});
  saveData(); showAlert('✅ Rate plan added!'); setTimeout(showRates,900);
}
function toggleRatePlan(id){ const p=D.rate_plans.find(x=>x.id===id); if(p){p.active=!p.active;saveData();showRates();} }

function buildNav_pills() {
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', p.textContent === resFilter);
  });
}

let selectedRes = null;
function reloadRes() {
  const q = resSearch.toLowerCase();
  const tbody = document.getElementById('res-body');
  if(!tbody) return;
  const rows = D.reservations.filter(r => {
    if(q && !r.guest.toLowerCase().includes(q) && !r.id.toLowerCase().includes(q)) return false;
    if(resFilter!=='All' && r.status!==resFilter) return false;
    return true;
  });
  tbody.innerHTML = rows.map(r => {
    const rm = D.rooms.find(x=>x.id===r.room)||{};
    const bal = r.total - r.paid;
    return `<tr onclick="selectRes('${r.id}',this)" class="${selectedRes===r.id?'selected':''}">
      <td>${r.id}</td><td>${r.guest}</td><td>${r.room}</td><td>${rm.type||''}</td>
      <td>${r.checkin}</td><td>${r.checkout}</td>
      <td>$${r.total.toFixed(0)}</td><td>$${r.paid.toFixed(0)}</td>
      <td style="color:${bal>0?'var(--red)':'var(--green)'}">$${bal.toFixed(0)}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="10" style="color:var(--text-muted);text-align:center;padding:20px">No reservations found</td></tr>';
}

function selectRes(id, row) {
  selectedRes = id;
  document.querySelectorAll('#res-body tr').forEach(r=>r.classList.remove('selected'));

}

function editRes() {
  if(!selectedRes) return toast('Please select a reservation first');
  const r = D.reservations.find(x=>x.id===selectedRes);
  if(r) showResForm(r);
}

function cancelRes() {
  if(!selectedRes) return toast('Please select a reservation first');
  showConfirm(`Cancel reservation ${selectedRes}?`, 'Room will be released and status set to Cancelled.', '❌', () => {
    const r = D.reservations.find(x=>x.id===selectedRes);
    if(r) {
      r.status = 'Cancelled';
      const rm = D.rooms.find(x=>x.id===r.room);
      if(rm) rm.status = 'Available';
      saveData(); selectedRes=null; showReservations();
    }
  });
}

function checkoutRes() {
  if(!selectedRes) return toast('Please select a reservation first');
  showConfirm(`Check Out reservation ${selectedRes}?`, 'Room will be marked Dirty and a cleaning task will be created.', '✅', () => {
    const r = D.reservations.find(x=>x.id===selectedRes);
    if(r) {
      r.status = 'Checked Out';
      const rm = D.rooms.find(x=>x.id===r.room);
      if(rm) { rm.status='Available'; rm.hk_status='Dirty'; }
      const hkId = `HK${String(D.next_hk_id).padStart(3,'0')}`; D.next_hk_id++;
      D.hk_tasks.push({id:hkId,room:r.room,task:'Post-checkout full cleaning',assigned:'',status:'Pending',priority:'High',date:today(),notes:''});
      saveData(); selectedRes=null; showReservations();

  });

function saveRes(existingId) {
  const guest    = $v('#f-guest').trim();
  const roomId   = $v('#f-room');
  const ci       = $v('#f-ci');
  const co       = $v('#f-co');
  const adults   = parseInt($v('#f-adults'))||1;
  const children = parseInt($v('#f-children'))||0;
  const source   = $v('#f-source');
  const discount = parseFloat($v('#f-discount'))||0;
  const paid     = parseFloat($v('#f-paid'))||0;
  const status   = $v('#f-status');
  const notes    = $v('#f-notes');

  if(!guest)  return showAlert('⚠️ Please enter guest name','error');
  if(!roomId) return showAlert('⚠️ Please select a room','error');
  const nights = nightsBetween(ci,co);
  if(nights<=0) return showAlert('⚠️ Check-out date must be after check-in','error');
  const room = D.rooms.find(r=>r.id===roomId);
  if(!room) return showAlert('⚠️ Room not found','error');
  const total = Math.max(0, stayRate(room, ci, co) - discount);

  const guestObj = D.guests.find(g=>g.name===guest);
  const guestId  = guestObj ? guestObj.id : '';

  if(existingId) {
    const r = D.reservations.find(x=>x.id===existingId);
    if(r) Object.assign(r,{guest,guest_id:guestId,room:roomId,checkin:ci,checkout:co,adults,children,total,paid,status,notes,source,discount});
    room.status = ['Confirmed','Checked In'].includes(status) ? 'Occupied' : 'Available';
  } else {
    const id = `RES${String(D.next_res_id).padStart(3,'0')}`; D.next_res_id++;
    D.reservations.push({id,guest,guest_id:guestId,room:roomId,checkin:ci,checkout:co,adults,children,total,paid,status,notes,source,discount});
    room.status = 'Occupied';
  }
  saveData();
  showAlert(`✅ Saved! ${nights} nights × $${room.price} - $${discount} discount = $${total.toFixed(0)}`);
  setTimeout(showReservations, 1200);
}

function cur(){ return (D.pos_settings && D.pos_settings.currency) || '$'; }
function money(n){ return cur()+(Number(n)||0).toFixed(2); }
const POS_CAT_COLORS={Beverages:'var(--blue)',Food:'var(--green)',Services:'var(--purple)',Spa:'var(--pink)',Other:'var(--pink)'};
function defaultPosState(){ return {orderType:'Dine-in',table:'',covers:1,guest:'',discMode:'amount',manualDisc:0,code:''}; }
let posState = defaultPosState();
let posCatFilter='All';

function showPOS(keep){

            <button class="btn btn-blue" onclick="showProducts()" style="margin-left:6px">📦 Manage Products</button>

          <span>🧾 Current Bill</span>
          <span id="parked-count" style="font-size:11px;color:var(--purple)">${D.parked_orders.length?('⏸ '+D.parked_orders.length+' held'):''}</span>
        </div>

        <div class="parked-bar" id="parked-bar">${renderParkedChips()}</div>

      </div>
    </div>
  `);
  refreshCart();
}

function posProductCards(list){
  if(!list.length) return '';
  return list.map(p=>{
    const oos=p.stock!==999&&p.stock<=0;
    const low=p.stock!==999&&p.stock>0&&p.stock<10;
    return `<button class="product-btn ${oos?'oos':''}" style="background:${POS_CAT_COLORS[p.category]||'var(--blue)'}" ${oos?'disabled':`onclick="addToCart('${p.id}')"`}>
      ${low?`<span class="p-low">${p.stock}</span>`:''}
      <span class="p-name">${p.name}</span>
      <span class="p-price">${money(p.price)}</span>
      <span class="p-stock">${p.stock===999?'∞':(oos?'Out of stock':'Stock: '+p.stock)}</span>
    </button>`;
  }).join('');
}
function setPosCat(cat,btn){
  posCatFilter=cat;
  document.querySelectorAll('#pos-pills .pill').forEach(p=>p.classList.remove('active'));
  if(btn)btn.classList.add('active');
  posFilter();
}
function posFilter(){
  const q=(document.getElementById('pos-search')?.value||'').trim().toLowerCase();
  let list=posCatFilter==='All'?D.products:D.products.filter(p=>p.category===posCatFilter);
  if(q) list=list.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.id||'').toLowerCase().includes(q));
  const grid=document.getElementById('prod-grid');
  if(grid) grid.innerHTML=list.length?posProductCards(list):'<div class="pos-empty" style="grid-column:1/-1"><div class="e-ic">🔍</div>No matching products</div>';
}
function posQuickAdd(){
  const q=(document.getElementById('pos-search')?.value||'').trim().toLowerCase();
  if(!q) return;
  const p=D.products.find(x=>(x.id||'').toLowerCase()===q)||D.products.find(x=>(x.name||'').toLowerCase()===q)
        ||D.products.find(x=>(x.name||'').toLowerCase().includes(q));
  if(p){ addToCart(p.id); const s=document.getElementById('pos-search'); if(s){s.value='';posFilter();} }
  else toast('No product matched');
}

function addToCart(pid){
  const p=D.products.find(x=>x.id===pid);if(!p)return;
  if(p.stock!==999&&p.stock<=0){toast('Out of stock');return;}
  const inCart=cartItems.filter(i=>i.id===pid).reduce((a,i)=>a+i.qty,0);
  if(p.stock!==999&&inCart>=p.stock){toast('No more stock available');return;}
  const ex=cartItems.find(i=>i.id===pid);
  if(ex){ex.qty++;ex.subtotal=ex.qty*ex.price;}
  else cartItems.push({id:p.id,name:p.name,price:p.price,qty:1,subtotal:p.price});
  refreshCart();
}
function cartInc(i){const it=cartItems[i];if(!it)return;const p=D.products.find(x=>x.id===it.id);if(p&&p.stock!==999&&it.qty>=p.stock){toast('No more stock available');return;}it.qty++;it.subtotal=it.qty*it.price;refreshCart();}
function cartDec(i){const it=cartItems[i];if(!it)return;it.qty--;if(it.qty<=0){cartItems.splice(i,1);}else{it.subtotal=it.qty*it.price;}refreshCart();}
function cartRemove(i){cartItems.splice(i,1);refreshCart();}
function clearCart(){cartItems=[];refreshCart();}

function calcDiscount(subtotal){
  let d=0;
  const code=(posState.code||'').trim().toUpperCase();
  if(code){const dc=D.discount_codes.find(x=>x.code===code&&x.active);if(dc)d+=dc.type==='percent'?subtotal*dc.value/100:dc.value;}
  const md=parseFloat(posState.manualDisc)||0;
  if(md>0)d+=posState.discMode==='percent'?subtotal*md/100:md;
  return Math.min(d,subtotal);
}
function posTotals(){
  const ps=D.pos_settings;
  const subtotal=cartItems.reduce((a,i)=>a+i.price*i.qty,0);
  const discount=calcDiscount(subtotal);
  const net=subtotal-discount;
  const service=ps.service_on?net*(ps.service_rate||0)/100:0;
  const vat=ps.vat_on?(net+service)*(ps.vat_rate||0)/100:0;
  const total=net+service+vat;
  return {subtotal,discount,net,service,vat,total};
}
function refreshCart(){
  const el=document.getElementById('cart-items');if(!el)return;
  el.innerHTML=cartItems.length?cartItems.map((it,i)=>`
    <div class="cart-item">
      <span class="cart-item-name">${it.name}<br><small style="color:var(--text-muted)">${money(it.price)}</small></span>
      <span class="cart-qty-ctrl">
        <button onclick="cartDec(${i})">−</button>
        <span class="q">${it.qty}</span>
        <button onclick="cartInc(${i})">+</button>
      </span>
      <span class="cart-item-total">${money(it.subtotal)}</span>
      <button class="cart-del" title="Remove" onclick="cartRemove(${i})">✕</button>
    </div>`).join(''):'<div class="cart-empty-note">🛒 Cart is empty — tap a product to add</div>';

  const t=posTotals(), ps=D.pos_settings;
  const tot=document.getElementById('pos-totals');
  if(tot)tot.innerHTML=`
    <div class="row"><span>Subtotal</span><span>${money(t.subtotal)}</span></div>
    ${t.discount?`<div class="row"><span>Discount</span><span class="neg">- ${money(t.discount)}</span></div>`:''}
    ${ps.service_on?`<div class="row"><span>Service (${ps.service_rate}%)</span><span>${money(t.service)}</span></div>`:''}
    ${ps.vat_on?`<div class="row"><span>VAT (${ps.vat_rate}%)</span><span>${money(t.vat)}</span></div>`:''}
    <div class="row grand"><span>TOTAL</span><span>${money(t.total)}</span></div>`;
}
function setOrderType(t,btn){posState.orderType=t;document.querySelectorAll('.order-type button').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');}
function setDiscMode(m){posState.discMode=m;document.getElementById('dm-amt')?.classList.toggle('active',m==='amount');document.getElementById('dm-pct')?.classList.toggle('active',m==='percent');refreshCart();}

// ── Park / Recall (hold orders) ──
function renderParkedChips(){
  return D.parked_orders.map(o=>`<button class="parked-chip" onclick="recallOrder('${o.id}')">⏸ ${o.label||o.id} · ${money(o.total)}</button>`).join('');
}
function parkOrder(){
  if(!cartItems.length)return toast('Cart is empty');
  const t=posTotals();
  const id='HOLD'+Date.now().toString().slice(-5);
  const label=posState.table?('T'+posState.table):(posState.guest||posState.orderType);
  D.parked_orders.push({id,label,total:t.total,items:cartItems.map(i=>({...i})),state:{...posState},time:new Date().toISOString()});
  saveData();
  clearCart(); posState=defaultPosState();
  showPOS(false);
  toast('Order held ✓','success');
}
function recallOrder(id){
  const o=D.parked_orders.find(x=>x.id===id);if(!o)return;
  if(cartItems.length){ if(!confirm('Replace current cart with the held order?')) return; }
  cartItems=o.items.map(i=>({...i}));
  posState={...defaultPosState(),...o.state};
  D.parked_orders=D.parked_orders.filter(x=>x.id!==id);
  saveData();
  showPOS(true);
}

function setPayMethod(m,btn){
  window._payMethod=m;
  document.querySelectorAll('#pay-methods button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById('cash-box').style.display=(m==='Cash')?'block':'none';
  document.getElementById('room-box').style.display=(m==='Room')?'block':'none';
}
function updateChange(){
  const t=posTotals();
  const tend=parseFloat($v('#pay-tendered'))||0;
  const ch=tend-t.total;
  const el=document.getElementById('pay-change');
  if(el){el.textContent=money(ch>0?ch:0);el.style.color=ch<0?'var(--red)':'var(--green)';}
}
function finalizeSale(){
  if(!cartItems.length)return;
  const method=window._payMethod||'Cash';
  const t=posTotals();
  let tendered=t.total,change=0;
  if(method==='Cash'){
    tendered=parseFloat($v('#pay-tendered'))||0;
    if(tendered<t.total)return showAlert('⚠️ Amount tendered is less than the total','error');
    change=tendered-t.total;
  }
  const guest=(posState.guest||'').trim();
  if(method==='Room'){
    if(!guest)return showAlert('⚠️ Enter the room number to charge to folio','error');
    const res=D.reservations.find(r=>r.room===guest&&r.status==='Checked In');
    if(!res)return showAlert('⚠️ No checked-in reservation found for this room','error');
  }
  const ps=D.pos_settings;
  const id=`SAL${String(D.next_sale_id).padStart(4,'0')}`;D.next_sale_id++;
  const sale={
    id,date:new Date().toISOString(),guest,
    items:cartItems.map(i=>({...i})),
    subtotal:t.subtotal,discount:t.discount,service:t.service,vat:t.vat,
    service_rate:ps.service_on?ps.service_rate:0,vat_rate:ps.vat_on?ps.vat_rate:0,
    total:t.total,order_type:posState.orderType,table:posState.table,covers:posState.covers,
    payment:{method,tendered,change,note:$v('#pay-note')},
    cashier:currentUser?currentUser.name:'',status:'Completed'
  };
  D.sales.push(sale);
  cartItems.forEach(it=>{const p=D.products.find(x=>x.id===it.id);if(p&&p.stock!==999)p.stock=Math.max(0,p.stock-it.qty);});
  if(method==='Room'&&guest){
    const res=D.reservations.find(r=>r.room===guest&&r.status==='Checked In');
    if(res){const fcId=`FC${String(D.next_folio_id).padStart(4,'0')}`;D.next_folio_id++;D.folio_charges.push({id:fcId,res_id:res.id,desc:`POS Sale ${id}`,amount:t.total,date:today()});}
  }
  if(guest){const g=D.guests.find(x=>x.name&&x.name.toLowerCase()===guest.toLowerCase());if(g)g.loyalty_pts=(g.loyalty_pts||0)+Math.floor(t.total);}
  saveData();
  cartItems=[];posState=defaultPosState();
  showReceiptPage(sale);
}

    </table>
    <div class="r-line"></div>

      <tr><td>Subtotal</td><td style="text-align:right">${money(s.subtotal)}</td></tr>
      ${s.discount?`<tr><td>Discount</td><td style="text-align:right">- ${money(s.discount)}</td></tr>`:''}
      ${s.service?`<tr><td>Service ${s.service_rate?('('+s.service_rate+'%)'):''}</td><td style="text-align:right">${money(s.service)}</td></tr>`:''}
      ${s.vat?`<tr><td>VAT ${s.vat_rate?('('+s.vat_rate+'%)'):''}</td><td style="text-align:right">${money(s.vat)}</td></tr>`:''}

// ── Sales History (today) with reprint / void ──
let salesHistScope='today';
function showSalesHistory(){
  setPageTitle('📜 Sales History');
  const list=(salesHistScope==='today'?D.sales.filter(s=>s.date&&s.date.startsWith(today())):D.sales).slice().reverse();
  const valid=list.filter(s=>s.status!=='Voided');
  const total=valid.reduce((a,s)=>a+(s.total||0),0);
  renderMain(`
    <div class="page-hdr"><button class="page-back" onclick="showPOS()">←</button><div class="page-ttl">Sales History</div></div>
    <div class="btn-row">
      <button class="btn ${salesHistScope==='today'?'btn-teal':'btn-gray'}" onclick="salesHistScope='today';showSalesHistory()">📅 Today</button>
      <button class="btn ${salesHistScope==='all'?'btn-teal':'btn-gray'}" onclick="salesHistScope='all';showSalesHistory()">🗂️ All</button>
    </div>
    <div class="stat-grid" style="margin-bottom:12px">
      ${sc('🧾','Transactions',valid.length,'--teal')}
      ${sc('💵','Revenue',money(total),'--gold')}
      ${sc('⏸️','Held Orders',D.parked_orders.length,'--purple')}
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>ID</th><th>Time</th><th>Guest</th><th>Type</th><th>Payment</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            ${list.length?list.map(s=>{const voided=s.status==='Voided';return `
              <tr style="${voided?'opacity:.5':''}">
                <td>${s.id}</td>
                <td>${new Date(s.date).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}</td>
                <td>${s.guest||'—'}</td>
                <td>${s.order_type||'—'}</td>
                <td>${s.payment?.method||'—'}</td>
                <td>${money(voided?(s.orig_total||0):s.total)}</td>
                <td>${voided?'<span class="badge badge-red">Voided</span>':'<span class="badge badge-green">Completed</span>'}</td>
                <td>
                  <button class="btn btn-blue" style="padding:4px 8px;font-size:11px" onclick="reprintSale('${s.id}')">🖨️</button>
                  ${voided?'':`<button class="btn btn-red" style="padding:4px 8px;font-size:11px" onclick="voidSale('${s.id}')">✖ Void</button>`}
                </td>
              </tr>`;}).join(''):'<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:20px">No sales found</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `);
}
function reprintSale(id){const s=D.sales.find(x=>x.id===id);if(s)showReceiptPage(s,'showSalesHistory()');}
function voidSale(id){
  const s=D.sales.find(x=>x.id===id);if(!s||s.status==='Voided')return;
  showConfirm(`Void sale ${id}?`,'Stock will be restored and the amount removed from revenue. This cannot be undone.','✖️',()=>{
    s.items.forEach(it=>{const p=D.products.find(x=>x.id===it.id);if(p&&p.stock!==999)p.stock+=it.qty;});
    if(s.guest){const g=D.guests.find(x=>x.name&&x.name.toLowerCase()===s.guest.toLowerCase());if(g)g.loyalty_pts=Math.max(0,(g.loyalty_pts||0)-Math.floor(s.orig_total||s.total));}
    D.folio_charges=D.folio_charges.filter(f=>f.desc!==`POS Sale ${id}`);
    s.orig_total=s.total;s.orig_discount=s.discount;s.total=0;s.discount=0;s.status='Voided';
    saveData();showSalesHistory();
  });
}

    ['Airport Transfer','Services',30,999,'trip']

  let n=D.products.length+1;

function saveProd(existingId){
  const id=$v('#fp-id').trim(),name=$v('#fp-name').trim(),category=$v('#fp-cat').trim(),price=parseFloat($v('#fp-price'))||0,stock=parseInt($v('#fp-stock'))||0,unit=$v('#fp-unit').trim();

  if(existingId){const p=D.products.find(x=>x.id===existingId);if(p)Object.assign(p,data);}
  else D.products.push(data);
  saveData();showAlert('✅ Saved!');setTimeout(showProducts,1000);
}

// ── USALI metric helpers (occupancy / ADR / RevPAR) ──
function resOccupiesNight(r,iso){ return ['Confirmed','Checked In','Checked Out'].includes(r.status) && r.checkin<=iso && iso<r.checkout; }
function perNightRevenue(r){ const n=nightsBetween(r.checkin,r.checkout); return n>0?(r.total||0)/n:0; }
function occMetrics(fromISO,toISO){
  const totalRooms=D.rooms.length||0;
  let days=0,roomNights=0,revenue=0; const perDay=[];
  let d=fromISO, guard=0;
  while(d<=toISO && guard<3660){
    let sold=0,rev=0;
    D.reservations.forEach(r=>{ if(resOccupiesNight(r,d)){ sold++; rev+=perNightRevenue(r); } });
    perDay.push({date:d,sold,avail:totalRooms,occ:totalRooms?sold/totalRooms:0,rev,adr:sold?rev/sold:0,revpar:totalRooms?rev/totalRooms:0});
    roomNights+=sold; revenue+=rev; days++; d=addDaysStr(d,1); guard++;
  }
  const cap=totalRooms*days;
  return {days,totalRooms,roomNights,revenue,perDay,occ:cap?roomNights/cap:0,adr:roomNights?revenue/roomNights:0,revpar:cap?revenue/cap:0};
}
function sourceMetrics(fromISO,toISO){
  const f=D.reservations.filter(r=>r.status!=='Cancelled'&&r.status!=='No-Show'&&r.checkin>=fromISO&&r.checkin<=toISO);
  const map={};
  f.forEach(r=>{const s=r.source||'Direct'; const m=map[s]||(map[s]={source:s,bookings:0,nights:0,revenue:0}); m.bookings++; m.nights+=nightsBetween(r.checkin,r.checkout); m.revenue+=(r.total||0);});
  const totalRev=Object.values(map).reduce((a,m)=>a+m.revenue,0);
  const rows=Object.values(map).map(m=>{const ota=(D.ota_channels||[]).find(o=>o.name===m.source); const commPct=ota?ota.commission||0:0; return {...m,adr:m.nights?m.revenue/m.nights:0,share:totalRev?m.revenue/totalRev:0,commPct,commission:m.revenue*commPct/100};}).sort((a,b)=>b.revenue-a.revenue);
  return {rows,totalRev,totalComm:rows.reduce((a,r)=>a+r.commission,0),totalBookings:f.length,totalNights:rows.reduce((a,r)=>a+r.nights,0)};
}
function mgrCol(fromISO,toISO){
  const act=r=>r.status!=='Cancelled'&&r.status!=='No-Show';
  const arr=D.reservations.filter(r=>act(r)&&r.checkin>=fromISO&&r.checkin<=toISO).length;
  const dep=D.reservations.filter(r=>act(r)&&r.checkout>=fromISO&&r.checkout<=toISO).length;
  const om=occMetrics(fromISO,toISO);
  const pos=D.sales.filter(s=>{const d=(s.date||'').slice(0,10);return d>=fromISO&&d<=toISO;}).reduce((a,s)=>a+(s.total||0),0);
  const folio=D.folio_charges.filter(f=>f.date>=fromISO&&f.date<=toISO).reduce((a,f)=>a+f.amount,0);
  const exp=D.expenses.filter(e=>e.date>=fromISO&&e.date<=toISO).reduce((a,e)=>a+e.amount,0);
  return {arr,dep,roomNights:om.roomNights,occ:om.occ,roomRev:om.revenue,adr:om.adr,revpar:om.revpar,pos,folio,exp,net:om.revenue+pos+folio-exp};
}
function pctStr(x){ return (x*100).toFixed(1)+'%'; }

let selectedOTA=null;

// performance of a channel, derived from reservations whose source === channel name
function otaStats(name){
  const res=D.reservations.filter(r=>(r.source||'')===name);
  const revenue=res.reduce((a,r)=>a+(r.paid||0),0);
  return {bookings:res.length, revenue};
}

// booking-source options used by the reservation form, grouped by category
function bookingSourceOptions(current){
  const base=['Direct','Phone','Walk-in','Agency'];
  let html = base.map(s=>`<option ${current===s?'selected':''}>${s}</option>`).join('');
  const list=(D.ota_channels||[]).filter(o=>o.status==='Active' && (o.category||'OTA')!=='Direct');
  const cats=[...new Set(list.map(o=>o.category||'OTA'))];
  cats.forEach(cat=>{
    const items=list.filter(o=>(o.category||'OTA')===cat).sort((a,b)=>a.name.localeCompare(b.name));
    html+=`<optgroup label="${cat}">`+items.map(o=>`<option ${current===o.name?'selected':''}>${o.name}</option>`).join('')+`</optgroup>`;
  });
  // make sure the current value is selectable even if it's an inactive/unknown channel
  if(current && !base.includes(current) && !list.some(o=>o.name===current)){
    html+=`<optgroup label="Other"><option selected>${current}</option></optgroup>`;
  }
  return html;
}

        <select id="ota-cat" class="form-select" style="width:auto" onchange="otaCatFilter=this.value;renderOTATable()">
          ${cats.map(c=>`<option ${otaCatFilter===c?'selected':''}>${c==='All'?'All Categories':c}</option>`).join('')}
        </select>
        <select id="ota-region" class="form-select" style="width:auto" onchange="otaRegionFilter=this.value;renderOTATable()">
          ${regions.map(r=>`<option value="${r}" ${otaRegionFilter===r?'selected':''}>${r==='All'?'All Regions':r}</option>`).join('')}
        </select>
        <button class="btn btn-gray" onclick="otaSearch='';otaCatFilter='All';otaRegionFilter='All';showOTA()">🔄 Reset</button>
      </div>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Channel</th><th>Category</th><th>Region</th><th>Commission</th><th>Bookings</th><th>Revenue</th><th>Commission $</th><th>Net Revenue</th><th>Website</th><th>Status</th></tr></thead>
          <tbody id="ota-tbody"></tbody>
        </table>
      </div>
    </div>
    <p style="font-size:11px;color:var(--text-muted);margin-top:10px;line-height:1.6">
      Showing <span id="ota-count"></span> of ${list.length} channels. Bookings &amp; revenue are calculated automatically from reservations whose <b>Booking Source</b> matches the channel name.
      Commission $ = Revenue × Commission %. &nbsp;Net = Revenue − Commission.
    </p>
  `);
  renderOTATable();
}

function renderOTATable(){
  const tb=document.getElementById('ota-tbody');
  if(!tb)return;
  const q=otaSearch.trim().toLowerCase();
  const rows=(D.ota_channels||[]).filter(o=>
    (otaCatFilter==='All'||(o.category||'OTA')===otaCatFilter) &&
    (otaRegionFilter==='All'||(o.region||'Global')===otaRegionFilter) &&
    (!q || (o.name||'').toLowerCase().includes(q) || (o.website||'').toLowerCase().includes(q))
  );
  const cntEl=document.getElementById('ota-count'); if(cntEl) cntEl.textContent=rows.length;
  tb.innerHTML = rows.length?rows.map(o=>{
    const s=otaStats(o.name); const comm=s.revenue*(o.commission||0)/100; const net=s.revenue-comm;
    return `
      <tr onclick="selectOTA('${o.id}',this)" class="${selectedOTA===o.id?'selected':''}">
        <td style="font-weight:700;text-align:left"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${o.color||'#3B82F6'};margin-right:7px"></span>${o.name}</td>
        <td><span class="badge badge-blue">${o.category||'OTA'}</span></td>
        <td style="font-size:11px;color:var(--text-sec)">${o.region||'Global'}</td>
        <td>${o.commission}%</td>
        <td>${s.bookings}</td>
        <td>$${s.revenue.toFixed(0)}</td>
        <td style="color:var(--red);font-weight:700">$${comm.toFixed(0)}</td>
        <td style="color:var(--green);font-weight:700">$${net.toFixed(0)}</td>
        <td>${o.website?`<a href="https://${o.website}" target="_blank" style="color:var(--blue)" onclick="event.stopPropagation()">${o.website}</a>`:'—'}</td>
        <td>${o.status==='Active'?'<span class="badge badge-green">Active</span>':'<span class="badge badge-gray">Inactive</span>'}</td>
      </tr>`;
  }).join(''):'<tr><td colspan="10" style="text-align:center;color:var(--text-muted);padding:16px">No channels match your filter</td></tr>';
}

function selectOTA(id,row){selectedOTA=id;document.querySelectorAll('tbody tr').forEach(r=>r.classList.remove('selected'));row.classList.add('selected');}

function editOTA(){
  if(!selectedOTA)return toast('Please select an OTA channel');
  const o=D.ota_channels.find(x=>x.id===selectedOTA);
  if(o)showOTAForm(o);
}

function deleteOTA(){
  if(!selectedOTA)return toast('Please select an OTA channel');
  const o=D.ota_channels.find(x=>x.id===selectedOTA);
  showConfirm(`Delete ${o?o.name:selectedOTA}?`,'This OTA channel will be removed from the list.','🗑️',()=>{
    D.ota_channels=D.ota_channels.filter(x=>x.id!==selectedOTA);saveData();selectedOTA=null;showOTA();
  });
}

function showOTAForm(o){
  setPageTitle(o?'🌐 Edit OTA':'🌐 Add OTA');
  const existingId=o?o.id:'';
  renderMain(`
    <div class="page-hdr"><button class="page-back" onclick="showOTA()">←</button><div class="page-ttl">${o?'Edit OTA Channel':'Add OTA Channel'}</div></div>
    <div id="alert-area"></div>
    <div class="form-section">
      <div class="form-hdr" style="background:var(--blue);color:#fff">🌐 OTA Details</div>
      <div class="form-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Channel Name *</label><input id="fo-name" class="form-input" value="${o?o.name:''}" placeholder="e.g. Booking.com"></div>
          <div class="form-group"><label class="form-label">Commission (%)</label><input id="fo-comm" class="form-input" type="number" step="0.1" value="${o?o.commission:''}"></div>
          <div class="form-group"><label class="form-label">Category</label><select id="fo-cat" class="form-select">${['OTA','Metasearch','Bedbank','Vacation Rental','Tour Operator','GDS','Direct'].map(c=>`<option ${o&&o.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
          <div class="form-group"><label class="form-label">Region</label><select id="fo-region" class="form-select">${['Global','Europe','Asia Pacific','Middle East','Americas','India','Africa'].map(r=>`<option ${o&&o.region===r?'selected':''}>${r}</option>`).join('')}</select></div>
          <div class="form-group"><label class="form-label">Contact Email</label><input id="fo-contact" class="form-input" value="${o?(o.contact||''):''}"></div>
          <div class="form-group"><label class="form-label">Phone</label><input id="fo-phone" class="form-input" value="${o?(o.phone||''):''}"></div>
          <div class="form-group"><label class="form-label">Hotel / Account ID</label><input id="fo-acc" class="form-input" value="${o?(o.account_id||''):''}"></div>
          <div class="form-group"><label class="form-label">Payment Terms</label><input id="fo-terms" class="form-input" value="${o?(o.terms||''):''}" placeholder="Monthly, CPC, Contract..."></div>
          <div class="form-group"><label class="form-label">Website</label><input id="fo-web" class="form-input" value="${o?(o.website||''):''}" placeholder="booking.com"></div>
          <div class="form-group"><label class="form-label">Status</label><select id="fo-status" class="form-select"><option ${o&&o.status==='Active'?'selected':''}>Active</option><option ${o&&o.status==='Inactive'?'selected':''}>Inactive</option></select></div>
        </div>
        <div class="form-actions">
          <button class="btn btn-blue" onclick="saveOTA('${existingId}')">💾 Save</button>
          <button class="btn btn-gray" onclick="showOTA()">✕ Cancel</button>
        </div>
      </div>
    </div>
  `);
}

function saveOTA(existingId){
  const name=$v('#fo-name').trim();
  if(!name)return showAlert('⚠️ Channel name is required','error');
  const data={
    name,
    commission:parseFloat($v('#fo-comm'))||0,
    category:$v('#fo-cat')||'OTA',
    region:$v('#fo-region')||'Global',
    contact:$v('#fo-contact').trim(),
    phone:$v('#fo-phone').trim(),
    account_id:$v('#fo-acc').trim(),
    terms:$v('#fo-terms').trim(),
    website:$v('#fo-web').trim().replace(/^https?:\/\//,'').replace(/\/$/,''),
    status:$v('#fo-status')||'Active'
  };
  if(existingId){
    const o=D.ota_channels.find(x=>x.id===existingId);
    if(o)Object.assign(o,data);
  }else{
    if(D.ota_channels.some(x=>x.name.toLowerCase()===name.toLowerCase()))return showAlert('⚠️ This OTA already exists','error');
    const id=`OTA${String(D.next_ota_id).padStart(2,'0')}`;D.next_ota_id++;
    data.color='#3B82F6';
    D.ota_channels.push({id,...data});
  }
  saveData();showAlert('✅ Saved!');setTimeout(showOTA,900);
}

function confirmResetData(){
  showConfirm('Reset all data to default?','This cannot be undone. All records will be permanently lost.','🗑️',()=>{
    localStorage.removeItem(STORE_KEY); D=defaultData(); saveData(); showAlert('✅ Data has been reset'); setTimeout(showSettings,800);
  });
}

let selectedStaff=null;
function showStaff(){
  if(currentUser.role!=='Manager')return;
  setPageTitle('👤 Staff');
  renderMain(`
    <div class="btn-row">
      <button class="btn btn-teal"   onclick="showStaffForm(null)">➕ Add Staff</button>
      <button class="btn btn-blue"   onclick="editStaff()">✏️ Edit</button>
      <button class="btn btn-purple" onclick="toggleStaff()">🔄 Toggle Active</button>
      <button class="btn btn-gold"   onclick="resetPass()">🔑 Reset Password</button>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Username</th><th>Name</th><th>Role</th><th>Status</th></tr></thead>
          <tbody>
            ${D.users.map(u=>`
              <tr onclick="selectStaff('${u.username}',this)" class="${selectedStaff===u.username?'selected':''}">
                <td>${u.username}</td><td>${u.name}</td><td>${u.role}</td>
                <td>${u.active!==false?'<span class="badge badge-green">✅ Active</span>':'<span class="badge badge-red">❌ Inactive</span>'}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `);
}
function selectStaff(id,row){selectedStaff=id;document.querySelectorAll('tbody tr').forEach(r=>r.classList.remove('selected'));row.classList.add('selected');}
function editStaff(){if(!selectedStaff)return toast('Please select a staff member');const u=D.users.find(x=>x.username===selectedStaff);if(u)showStaffForm(u);}
function toggleStaff(){
  if(!selectedStaff)return toast('Please select a staff member');
  if(selectedStaff===currentUser.username)return toast('You cannot deactivate your own account');
  const u=D.users.find(x=>x.username===selectedStaff);
  if(u){u.active=!u.active;saveData();showStaff();}
}
function resetPass(){
  if(!selectedStaff)return toast('Please select a staff member');
  const u=D.users.find(x=>x.username===selectedStaff);if(!u)return;
  setPageTitle('🔑 Reset Password');
  renderMain(`
    <div class="page-hdr"><button class="page-back" onclick="showStaff()">←</button><div class="page-ttl">Reset Password — ${u.name}</div></div>
    <div id="alert-area"></div>
    <div class="form-section">
      <div class="form-hdr" style="background:var(--gold);color:#0A0E1A">🔑 New Password</div>
      <div class="form-body">
        <div class="form-group"><label class="form-label">New Password</label><input id="rp-pass" class="form-input" type="password"></div>
        <div class="form-actions">
          <button class="btn btn-gold" onclick="applyResetPass('${u.username}')">🔑 Apply</button>
          <button class="btn btn-gray" onclick="showStaff()">✕ Cancel</button>
        </div>
      </div>
    </div>
  `);
}
async function applyResetPass(username){
  const p=$v('#rp-pass').trim();
  if(p.length<3)return showAlert('⚠️ Password too short (minimum 3 characters)','error');
  const hash=await sha256(p);
  const u=D.users.find(x=>x.username===username);
  if(u){u.password=hash;saveData();showAlert('✅ Password changed successfully!');}
  setTimeout(showStaff,1000);
}
function showStaffForm(user){
  setPageTitle(user?'👤 Edit Staff':'👤 Add Staff');
  renderMain(`
    <div class="page-hdr"><button class="page-back" onclick="showStaff()">←</button><div class="page-ttl">${user?'Edit Staff':'Add Staff'}</div></div>
    <div id="alert-area"></div>
    <div class="form-section">
      <div class="form-hdr" style="background:var(--teal);color:#0A0E1A">👤 Staff Details</div>
      <div class="form-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Username</label><input id="fs-uname" class="form-input" value="${user?user.username:''}" ${user?'readonly':''}></div>
          <div class="form-group"><label class="form-label">Full Name</label><input id="fs-name" class="form-input" value="${user?user.name:''}"></div>
          <div class="form-group"><label class="form-label">Role</label>
            <select id="fs-role" class="form-select">${['Manager','Receptionist','Housekeeping','Accountant','Other'].map(r=>`<option ${user&&user.role===r?'selected':''}>${r}</option>`).join('')}</select></div>
          ${!user?`<div class="form-group"><label class="form-label">Password</label><input id="fs-pass" class="form-input" type="password"></div>`:''}
        </div>
        <div class="form-actions">
          <button class="btn btn-teal" onclick="saveStaff('${user?user.username:''}')">💾 Save</button>
          <button class="btn btn-red" onclick="showStaff()">✕ Cancel</button>
        </div>
      </div>
    </div>
  `);
}
async function saveStaff(existingUser){
  const uname=$v('#fs-uname').trim(),name=$v('#fs-name').trim(),role=$v('#fs-role');
  if(!uname||!name)return showAlert('⚠️ Please fill all required fields','error');
  if(existingUser){const u=D.users.find(x=>x.username===existingUser);if(u){u.name=name;u.role=role;}}
  else{
    if(D.users.find(u=>u.username===uname))return showAlert('⚠️ Username already exists','error');
    const pass=$v('#fs-pass')||'123';
    const hash=await sha256(pass);
    D.users.push({username:uname,name,role,password:hash,active:true});
  }
  saveData();showAlert('✅ Saved!');setTimeout(showStaff,1000);
}

function showSettings(){
  setPageTitle('⚙️ Settings');
  renderMain(`
    <div class="form-section">

        <div class="card-title">🔑 Change Password</div>
        <div id="alert-area"></div>

          <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-sec)"><input type="checkbox" id="ps-vat-on" ${D.pos_settings.vat_on?'checked':''}> Apply VAT/Tax</label>
        </div>
        <div class="form-group" style="margin-bottom:10px"><label class="form-label">Receipt Footer</label><input id="ps-foot" class="form-input" value="${D.pos_settings.footer||''}"></div>

      </div>

      <div class="card" style="margin-bottom:14px">
        <div class="card-title">🏷️ Discount Codes</div>

            <span style="color:var(--teal);font-weight:700">🏷️ ${c.code} — ${c.value}${c.type==='percent'?'%':'$'} off</span>
            <span>${c.active?'<span class="badge badge-green">Active</span>':'<span class="badge badge-gray">Inactive</span>'}</span>
          </div>`).join('')}
      </div>

      <div class="card">
        <div class="card-title">ℹ️ System Info</div>
        ${[['System','TIBA ERP v5.0'],['Current User',currentUser.name],['Role',currentUser.role],['Today',today()]].map(([k,v])=>`
          <div style="display:flex;justify-content:space-between;background:var(--hover);padding:8px 12px;border-radius:8px;margin-bottom:6px;font-size:12px">
            <span style="color:var(--text-sec)">${k}</span>
            <span style="color:var(--teal);font-weight:700">${v}</span>
          </div>`).join('')}

          <button class="btn btn-red" onclick="confirmResetData()">🗑️ Reset All Data</button>
        </div>
      </div>

  `);
}
async function changeMyPass(){
  const old=$v('#s-old'),nw=$v('#s-new'),con=$v('#s-con');
  const oldHash=await sha256(old);
  const u=D.users.find(x=>x.username===currentUser.username);
  if(!u||u.password!==oldHash)return showAlert('⚠️ Current password is incorrect','error');
  if(nw!==con)return showAlert('⚠️ Passwords do not match','error');
  if(nw.length<3)return showAlert('⚠️ Password is too short','error');
  u.password=await sha256(nw);saveData();
  showAlert('✅ Password changed successfully!');
  document.getElementById('s-old').value='';document.getElementById('s-new').value='';document.getElementById('s-con').value='';
}
function savePosSettings(){
  const ps=D.pos_settings;
  ps.currency=($v('#ps-cur').trim())||'$';
  ps.hotel_name=$v('#ps-name').trim();
  ps.service_rate=parseFloat($v('#ps-service'))||0;
  ps.vat_rate=parseFloat($v('#ps-vat'))||0;
  ps.service_on=document.getElementById('ps-service-on').checked;
  ps.vat_on=document.getElementById('ps-vat-on').checked;
  ps.footer=$v('#ps-foot').trim();
  saveData();
  showAlert('✅ POS settings saved!','success','pos-set-alert');
}
</script>
